name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build with CGO and FTS5
        run: |
          go build -tags "fts5" -o cortex-${{ matrix.platform }}-amd64 ./cmd/cortex

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-${{ matrix.platform }}-amd64
          path: cortex-${{ matrix.platform }}-amd64*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: cortex-*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETRY_COUNT: 3

      - name: Retry Release on failure
        if: failure()
        run: |
          echo "Release failed, retrying..."
          for i in 1 2 3; do
            echo "Attempt $i..."
            if gh release create v1.0.2 --draft --title "v1.0.2" --notes "Add Go and Text chunkers" cortex-* 2>/dev/null; then
              echo "Release created successfully"
              exit 0
            fi
            sleep 5
          done
          echo "All retries failed"
